<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Prasenjit Behera CV</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:25px;

      font-family:Arial, sans-serif;

      background:linear-gradient(
      135deg,
      #dbe7e7,
      #cfe0e0,
      #dfeeee
      );

    }

    .cv-container{

      width:100%;
      max-width:1200px;

      background:#ffffff;

      border-radius:22px;

      overflow:hidden;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.12),
      0 0 80px rgba(0,0,0,0.05);

      transition:0.3s;

    }

    .cv-container:hover{

      transform:translateY(-3px);

    }

    .cv-container img{

      width:100%;
      display:block;
      object-fit:contain;

    }

    @media(max-width:768px){

      body{

        padding:12px;

      }

      .cv-container{

        border-radius:18px;

      }

    }

  </style>

</head>

<body>

  <div class="cv-container">

    <img src="PRASENJIT BEHERA RESUMNE_page-0001.jpg" alt="Prasenjit Behera Resume">

  </div>

</body>

</html>
